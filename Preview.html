<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toaru | MAX Player Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Configurações Globais --- */
        :root {
            --primary-color: #9d4edd;
            --background-gradient: linear-gradient(45deg, #020108, #191032, #0d0d0d);
            --card-background: rgba(26, 26, 26, 0.7);
            --header-background: rgba(10, 10, 10, 0.5);
            --text-color: #f5f5f7;
            --text-muted: #a1a1a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--background-gradient);
            color: var(--text-color);
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, .logo { font-family: 'Orbitron', sans-serif; }

        /* --- Animações --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Cabeçalho e Seções (Mantidos da versão anterior) --- */
        header {
            display: flex; justify-content: space-between; align-items: center; padding: 1rem 4%;
            background: var(--header-background); backdrop-filter: blur(15px); position: fixed;
            width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(157, 78, 221, 0.2);
        }
        .logo { font-size: 1.8rem; color: var(--primary-color); text-shadow: 0 0 12px var(--primary-color); }
        .header-icons { display: flex; align-items: center; gap: 1.5rem; }
        .header-icons .icon-btn { font-size: 1.4rem; color: var(--text-color); cursor: pointer; transition: color 0.3s ease, transform 0.3s ease; }
        .header-icons .icon-btn:hover { color: var(--primary-color); transform: scale(1.1); }
        .hero-section {
            display: flex; align-items: center; justify-content: center; text-align: center; height: 95vh; padding: 0 5%;
            background: linear-gradient(rgba(0,0,0,0.8), transparent 70%, rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/6d/c6/7c/6dc67c45951811b6e175eba536421723.gif') no-repeat center center/cover;
        }
        .hero-content { max-width: 800px; animation: fadeInUp 1.2s ease-out; }
        .hero-content h1 { font-size: 3.5rem; text-shadow: 0 0 20px black; color: var(--primary-color); margin-bottom: 1rem; }
        .hero-content p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem; }
        .hero-content .cta-button {
            background: var(--primary-color); color: white; border: none; padding: 1rem 2.5rem;
            font-size: 1.1rem; font-weight: 700; border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
        }
        .hero-content .cta-button:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(157, 78, 221, 0.8); }
        .carousel-section { padding: 60px 0; opacity: 0; }
        .carousel-section.visible { animation: fadeInUp 1s forwards; }
        .carousel-header { display: flex; justify-content: space-between; align-items: center; padding: 0 4%; margin-bottom: 1.5rem; }
        .carousel-header h2 { font-size: 1.8rem; }
        .carousel-nav button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1rem; margin-left: 0.5rem; transition: all 0.2s ease;
        }
        .carousel-nav button:hover { background: var(--primary-color); }
        .carousel-container { position: relative; padding: 0 4%; }
        .carousel-track {
            display: flex; gap: 1.5rem; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 1rem;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .carousel-track::-webkit-scrollbar { display: none; }
        .carousel-card {
            flex: 0 0 280px; background: var(--card-background); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 1.5rem; text-align: center; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .carousel-card:hover { transform: scale(1.05); border-color: var(--primary-color); box-shadow: 0 0 25px rgba(157, 78, 221, 0.5); }
        .carousel-card h3 { font-size: 1.3rem; color: var(--text-color); }

        /* --- Player Section & Container --- */
        .player-section { padding: 60px 4%; opacity: 0; }
        .player-section.visible { animation: fadeInUp 1s forwards; }
        .player-container {
            position: relative; max-width: 1100px; margin: 0 auto;
            overflow: hidden; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .player-container video { width: 100%; display: block; }
        
        /* === PLAYER CONTROLS V2 - ESTILO MAX === */
        .video-controls-container {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 1rem 2rem 1.5rem 2rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
        }
        .player-container.controls-visible .video-controls-container {
            opacity: 1;
            visibility: visible;
        }

        /* --- Barra de Progresso --- */
        .timeline-container {
            width: 100%; height: 20px;
            cursor: pointer;
            display: flex; align-items: center;
        }
        .timeline {
            background-color: rgba(255, 255, 255, 0.3);
            height: 4px;
            width: 100%;
            position: relative;
        }
        .timeline .progress-bar {
            background-color: var(--primary-color);
            height: 100%; width: 0%;
            transition: width 0.1s linear;
        }
        .timeline-container:hover .timeline .progress-bar::after {
            content: '';
            position: absolute;
            right: 0; top: 50%;
            transform: translate(50%, -50%);
            width: 14px; height: 14px;
            background-color: white;
            border-radius: 50%;
        }

        /* --- Botões Principais --- */
        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }
        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .main-controls .control-btn {
            background: none; border: none;
            color: var(--text-color);
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .main-controls .control-btn:hover {
            color: white;
            transform: scale(1.1);
        }
        .play-pause-btn i { font-size: 1.8rem; }
        .time-display {
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            color: var(--text-muted);
        }

        /* --- Controle de Volume com Pop-up --- */
        .volume-control-container {
            position: relative;
        }
        .volume-popup {
            position: absolute;
            bottom: 150%; /* Posiciona acima do botão */
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 1rem 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease-out;
        }
        .volume-control-container.active .volume-popup {
            opacity: 1;
            visibility: visible;
            bottom: 120%;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 8px;
            height: 100px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px;
            background: white;
            border-radius: 50%;
        }

        /* --- Rodapé --- */
        footer {
            text-align: center; padding: 3rem 1rem; margin-top: 50px;
            border-top: 1px solid rgba(157, 78, 221, 0.1);
            color: var(--text-muted); font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">TOARU</div>
        <div class="header-icons">
            <i class="fas fa-search icon-btn"></i>
            <i class="fas fa-user-circle icon-btn"></i>
        </div>
    </header>

    <main>
        <section class="hero-section" id="hero"></section>
        <section class="carousel-section" id="series-carousel"></section>
        <section class="carousel-section" id="tier-carousel"></section>

        <section class="player-section" id="player-section">
            <div class="carousel-header"><h2>Cena em Destaque: O Despertar</h2></div>
            <div class="player-container">
                <video id="main-video" src="https://p1.animescomix.com/stream/animes/t/toaru-kagaku-no-accelerator/06.mp4" preload="metadata"></video>
                
                <div class="video-controls-container">
                    <div class="timeline-container">
                        <div class="timeline">
                            <div class="progress-bar"></div>
                        </div>
                    </div>
                    <div class="main-controls">
                        <div class="controls-left">
                            <button class="control-btn backward-btn"><i class="fas fa-backward-step"></i></button>
                            <button class="control-btn play-pause-btn"><i class="fas fa-play"></i></button>
                            <button class="control-btn forward-btn"><i class="fas fa-forward-step"></i></button>
                            <span class="time-display">0:00 / 2:17</span>
                        </div>
                        <div class="controls-right">
                            <div class="volume-control-container">
                                <button class="control-btn volume-btn"><i class="fas fa-volume-high"></i></button>
                                <div class="volume-popup">
                                    <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="1">
                                </div>
                            </div>
                            <button class="control-btn settings-btn"><i class="fas fa-cog"></i></button>
                            <button class="control-btn fullscreen-btn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>Toaru MAX Preview. Criado por um fã. Todos os direitos reservados.</footer>

    <script>
        // Preencher conteúdo dinamicamente para manter o HTML limpo
        document.getElementById('hero').innerHTML = `<div class="hero-content"><h1>O Universo se Expande.</h1><p>Ciência e Magia colidem. Explore as crônicas de Academy City, desde os milagres de Index até o poder absoluto de Accelerator.</p><button class="cta-button">Assista Agora</button></div>`;
        document.getElementById('series-carousel').innerHTML = `<div class="carousel-header"><h2>Séries Principais</h2><div class="carousel-nav"><button class="prev-btn"><i class="fas fa-chevron-left"></i></button><button class="next-btn"><i class="fas fa-chevron-right"></i></button></div></div><div class="carousel-container"><div class="carousel-track"><div class="carousel-card"><h3>Toaru Majutsu no Index</h3></div><div class="carousel-card"><h3>Toaru Kagaku no Railgun</h3></div><div class="carousel-card"><h3>Toaru Kagaku no Accelerator</h3></div><div class="carousel-card"><h3>Toaru Kagaku no Dark Matter</h3></div><div class="carousel-card"><h3>Toaru Kagaku no Astral Buddy</h3></div><div class="carousel-card"><h3>Toaru Kagaku no Mental Out</h3></div><div class="carousel-card"><h3>Toaru Anbu no ITEM</h3></div></div></div>`;
        document.getElementById('tier-carousel').innerHTML = `<div class="carousel-header"><h2>Temporadas em Destaque</h2><div class="carousel-nav"><button class="prev-btn"><i class="fas fa-chevron-left"></i></button><button class="next-btn"><i class="fas fa-chevron-right"></i></button></div></div><div class="carousel-container"><div class="carousel-track"><div class="carousel-card"><h3>#1 Accelerator</h3></div><div class="carousel-card"><h3>#2 Railgun S</h3></div><div class="carousel-card"><h3>#3 Index II</h3></div></div></div>`;
        
        // Scripts de Animação e Carrossel (Mantidos)
        const animatedSections = document.querySelectorAll('.carousel-section, .player-section');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        animatedSections.forEach(section => observer.observe(section));

        document.querySelectorAll('.carousel-section').forEach(carousel => {
            const track = carousel.querySelector('.carousel-track');
            const prevBtn = carousel.querySelector('.prev-btn');
            const nextBtn = carousel.querySelector('.next-btn');
            const cardWidth = carousel.querySelector('.carousel-card')?.offsetWidth || 300;
            if(prevBtn && nextBtn){
                nextBtn.addEventListener('click', () => { track.scrollBy({ left: cardWidth * 2, behavior: 'smooth' }); });
                prevBtn.addEventListener('click', () => { track.scrollBy({ left: -cardWidth * 2, behavior: 'smooth' }); });
            }
        });

        // === SCRIPT DO PLAYER V2 - ESTILO MAX ===
        const playerContainer = document.querySelector('.player-container');
        const video = document.getElementById('main-video');
        
        // Elementos do Player
        const playPauseBtn = document.querySelector('.play-pause-btn');
        const backwardBtn = document.querySelector('.backward-btn');
        const forwardBtn = document.querySelector('.forward-btn');
        const timelineContainer = document.querySelector('.timeline-container');
        const progressBar = document.querySelector('.progress-bar');
        const timeDisplay = document.querySelector('.time-display');
        const volumeBtn = document.querySelector('.volume-btn');
        const volumeContainer = document.querySelector('.volume-control-container');
        const volumeSlider = document.querySelector('.volume-slider');
        const fullscreenBtn = document.querySelector('.fullscreen-btn');

        // Configurações do Clipe
        const startTime = 913, endTime = 1050, clipDuration = endTime - startTime;

        // --- Funções do Player ---
        const formatTime = (seconds) => {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${min}:${sec}`;
        }
        
        const togglePlay = () => {
            if (video.paused) {
                if (video.currentTime >= endTime) video.currentTime = startTime;
                video.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }
        
        const updateProgress = () => {
            if (video.currentTime >= endTime) {
                video.pause();
                video.currentTime = endTime;
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
            const currentClipTime = video.currentTime - startTime;
            const progressPercent = (currentClipTime / clipDuration) * 100;
            progressBar.style.width = `${Math.max(0, Math.min(100, progressPercent))}%`;
            timeDisplay.textContent = `${formatTime(currentClipTime)} / ${formatTime(clipDuration)}`;
        }
        
        const setProgress = (e) => {
            const timelineWidth = timelineContainer.clientWidth;
            const clickX = e.offsetX;
            video.currentTime = startTime + ((clickX / timelineWidth) * clipDuration);
        }

        const handleVolume = () => {
            video.volume = volumeSlider.value;
            video.muted = volumeSlider.value === 0;
            updateVolumeIcon();
        }

        const updateVolumeIcon = () => {
            const icon = volumeBtn.querySelector('i');
            if (video.muted || video.volume === 0) icon.className = 'fas fa-volume-xmark';
            else if (video.volume < 0.5) icon.className = 'fas fa-volume-low';
            else icon.className = 'fas fa-volume-high';
        }

        const toggleFullscreen = () => {
             if (!document.fullscreenElement) playerContainer.requestFullscreen().catch(err => alert(`Erro: ${err.message}`));
             else document.exitFullscreen();
        }

        // --- Visibilidade dos Controles (Auto-hide) ---
        let controlsTimeout;
        const showControls = () => {
            clearTimeout(controlsTimeout);
            playerContainer.classList.add('controls-visible');
            if(!video.paused) {
                controlsTimeout = setTimeout(() => {
                    playerContainer.classList.remove('controls-visible');
                }, 3000);
            }
        }
        
        // --- Event Listeners ---
        video.addEventListener('loadedmetadata', () => { video.currentTime = startTime; updateProgress(); });
        playPauseBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('play', showControls);
        video.addEventListener('pause', showControls);
        backwardBtn.addEventListener('click', () => { video.currentTime = Math.max(startTime, video.currentTime - 10); });
        forwardBtn.addEventListener('click', () => { video.currentTime = Math.min(endTime, video.currentTime + 10); });
        timelineContainer.addEventListener('click', setProgress);
        volumeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            volumeContainer.classList.toggle('active');
        });
        document.addEventListener('click', (e) => {
            if (!volumeContainer.contains(e.target)) volumeContainer.classList.remove('active');
        });
        volumeSlider.addEventListener('input', handleVolume);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        playerContainer.addEventListener('mousemove', showControls);
        playerContainer.addEventListener('mouseleave', () => {
             if(!video.paused) playerContainer.classList.remove('controls-visible');
        });

    </script>
</body>
</html>
